; ============================================================================
; PlatformIO Configuration
; HHIP 5C Indexing Spin Jig Controller
; ============================================================================

[env:esp32]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600

; --- Library Dependencies ---
lib_deps =
    ; Stepper motor acceleration library
    waspinator/AccelStepper@^1.64
    ; TMC stepper driver library (UART control)
    teemuatlut/TMCStepper@^0.7.3
    ; OLED display driver
    adafruit/Adafruit SSD1306@^2.5.9
    ; GFX core (required by SSD1306)
    adafruit/Adafruit GFX Library@^1.11.9
    ; I2C bus library (required by SSD1306)
    adafruit/Adafruit BusIO@^1.15.0

; --- Build Flags ---
build_flags =
    -D CORE_DEBUG_LEVEL=1
    -D BOARD_HAS_PSRAM=0

; --- Serial Monitor Filters ---
monitor_filters = 
    default
    esp32_exception_decoder
