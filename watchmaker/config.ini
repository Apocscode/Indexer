# ============================================================================
# Watchmaker's Lathe Controller — Configuration
# Edit this file to match your hardware setup
# ============================================================================

[motor]
# Stepper motor specs
steps_per_rev = 400          ; 0.9° motor = 400, 1.8° motor = 200
microsteps = 256             ; TMC2209: 1, 2, 4, 8, 16, 32, 64, 128, 256
current_ma = 1200            ; RMS run current in milliamps
hold_current_ma = 400        ; Hold current (reduced when idle)
invert_direction = false     ; Flip if motor spins wrong way

[gear_ratio]
# Timing belt pulleys
motor_teeth = 20             ; Drive pulley (on motor shaft)
spindle_teeth = 60           ; Driven pulley (on lathe spindle)
# Effective ratio = spindle_teeth / motor_teeth = 3.0

[speed]
# RPM limits at the SPINDLE (after gear ratio)
min_rpm = 50
max_rpm = 8000
default_rpm = 500
accel_rpm_per_sec = 500      ; RPM/second ramp rate
decel_rpm_per_sec = 800      ; RPM/second for stopping (faster than accel)
soft_start_ms = 1000         ; Soft-start ramp time on first GO

[pid]
# PID controller for RPM regulation
kp = 0.8
ki = 0.3
kd = 0.05
sample_rate_hz = 20          ; PID update frequency
output_min = 0.0             ; Min step frequency multiplier
output_max = 1.0             ; Max step frequency multiplier
integral_max = 100.0         ; Anti-windup limit

[rpm_sensor]
# Hall effect or optical sensor
enabled = true
gpio_pin = 23
pulses_per_rev = 1           ; 1 magnet = 1 pulse/rev
filter_samples = 4           ; Moving average window
timeout_ms = 2000            ; No pulse for this long = 0 RPM

[gpio]
# Stepper driver
pin_step = 17
pin_dir = 27
pin_enable = 22
pin_uart_tx = 14
pin_uart_rx = 15

# Rotary encoder (speed knob)
pin_enc_clk = 5
pin_enc_dt = 6
pin_enc_sw = 13

# Buttons
pin_btn_mode = 16
pin_btn_go_stop = 20
pin_btn_estop = 21

[display]
# Touchscreen settings
fullscreen = true
width = 800
height = 480
theme = dark                 ; dark or light
font_size = 14
show_rpm_graph = true
graph_history_sec = 30       ; Seconds of RPM history to plot

[indexing]
# Default indexing settings
default_divisions = 6
jog_increments = 0.01, 0.1, 1.0, 5.0, 10.0
default_jog_index = 2        ; Start at 1.0°

[advanced]
# Step pulse timing
step_pulse_us = 2            ; Minimum step pulse width (microseconds)
dir_setup_us = 5             ; Direction setup time before step
enable_delay_ms = 10         ; Delay after enabling driver
uart_baud = 115200           ; TMC2209 UART baud rate
log_level = INFO             ; DEBUG, INFO, WARNING, ERROR
